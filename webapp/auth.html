<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrar ou criar conta — DevHub</title>
  <link rel="stylesheet" href="assets/css/theme.css"/>
</head>
<body data-page="auth">
  <header class="navbar">
    <div class="container inner">
      <a class="brand" href="index.html"><span class="dot"></span>DevHub</a>
      <nav><a class="btn btn-outline" href="index.html">Voltar ao início</a></nav>
    </div>
  </header>

  <main class="section">
    <div class="container" style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem">
      <div class="card" style="display:grid; gap:1rem">
        <h2>Entrar</h2>
        <form class="form" id="form-login">
          <input id="login-email" class="input" type="email" required placeholder="E-mail" />
          <input id="login-senha" class="input" type="password" required placeholder="Senha" />
          <button class="btn btn-primary" type="submit">Entrar</button>
        </form>
        <p style="font-size:.95rem; color:#4a4f58">Ao entrar, você concorda com nossos termos e política de privacidade.</p>
      </div>

      <div class="card" style="display:grid; gap:1rem; border:2px dashed var(--c-blue-light)">
        <h2>Criar conta</h2>
        <form class="form" id="form-register">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:.6rem">
            <input id="cad-nome" class="input" type="text" required placeholder="Nome"/>
            <select id="cad-tipo" class="input" required>
              <option value="">Eu sou...</option>
              <option value="cliente">Cliente</option>
              <option value="empresa">Empresa</option>
              <option value="freelancer">Freelancer</option>
            </select>
          </div>
          <input id="cad-email" class="input" type="email" required placeholder="E-mail"/>
          <input id="cad-senha" class="input" type="password" required minlength="6" placeholder="Senha (mín. 6 caracteres)"/>
          <button class="btn btn-outline" type="submit">Criar conta</button>
        </form>
        <p style="font-size:.95rem; color:#4a4f58">Cadastro simples e rápido. Sem taxas para começar.</p>
      </div>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
