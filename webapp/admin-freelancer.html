<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Painel do Freelancer — DevHub</title>
  <link rel="stylesheet" href="assets/css/theme.css"/>
  <style>
    .dashboard    { display: grid; gap: 2rem; }
    .cards        { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .card-sm      { background: var(--c-white); border-radius: var(--rounded); box-shadow: var(--shadow-small); padding: 1.5rem; }
    .card-sm strong { display: block; font-size: 2rem; color: var(--c-purple); margin-bottom: .2rem; }
    .layout       { display: grid; gap: 2rem; grid-template-columns: 2fr 1fr; }
    .box          { background: var(--c-white); border-radius: var(--rounded); box-shadow: var(--shadow-small); padding: 1.8rem; }
    .services     { display: grid; gap: 1rem; }
    .service-row  { border: 1px solid #e3e8f6; border-radius: 12px; padding: 1rem; display: grid; gap: .6rem; }
    .service-row h3 { margin: 0; font-size: 1.2rem; color: var(--c-black); }
    .service-row footer { display: flex; gap: .5rem; }
    .service-row footer button { border: none; border-radius: 8px; padding: .5rem 1rem; cursor: pointer; font-size: .9rem; }
    .btn-secondary { background: var(--c-blue-deep); color: #fff; }
    .btn-danger    { background: #dc3545; color: #fff; }
    form.form-grid { display: grid; gap: 1rem; }
    .grid-2        { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
    .input, textarea, select { width: 100%; padding: .75rem; border-radius: 8px; border: 1px solid #d5d9eb; }
    textarea { min-height: 120px; resize: vertical; }
    .tags { font-size: .9rem; color: #4a4f58; }
    @media(max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-page="admin-freelancer">
  <header class="navbar">
    <div class="container inner">
      <a class="brand" href="index.html"><span class="dot"></span>DevHub</a>
      <nav style="display:flex; gap:1rem; align-items:center">
        <a class="btn btn-outline" href="marketplace.html">Marketplace</a>
        <button class="btn btn-outline" id="btn-logout">Sair</button>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container dashboard">
      <header>
        <h1>Painel do Freelancer</h1>
        <p id="welcome-msg" style="color:#4a4f58">Carregando informações...</p>
      </header>

      <section class="cards">
        <article class="card-sm">
          <strong id="stat-services">0</strong>
          <span>Total de serviços</span>
        </article>
        <article class="card-sm">
          <strong id="stat-active">0</strong>
          <span>Serviços ativos</span>
        </article>
        <article class="card-sm">
          <strong id="stat-views">0</strong>
          <span>Visualizações</span>
        </article>
      </section>

      <section class="layout">
        <section class="box">
          <header style="display:flex;justify-content:space-between;align-items:center; margin-bottom:1rem;">
            <div>
              <h2 style="margin:0">Serviços cadastrados</h2>
              <small style="color:#6c7280">Gerencie os serviços oferecidos aos clientes</small>
            </div>
            <button class="btn btn-primary" id="btn-new-service">Novo serviço</button>
          </header>
          <div class="services" id="services-list">
            <p style="color:#4a4f58">Nenhum serviço cadastrado ainda.</p>
          </div>
        </section>

        <aside class="box" id="service-form-wrapper">
          <h2 id="form-title" style="margin-top:0">Adicionar serviço</h2>
          <form id="service-form" class="form-grid">
            <input type="hidden" id="service-id" />
            <label>
              Título
              <input class="input" id="service-title" required placeholder="Nome do serviço"/>
            </label>
            <label>
              Descrição
              <textarea id="service-description" required placeholder="Descreva seu serviço"></textarea>
            </label>
            <div class="grid-2">
              <label>
                Preço (R$)
                <input class="input" type="number" step="0.01" id="service-price" required />
              </label>
              <label>
                Prazo de entrega (dias)
                <input class="input" type="number" min="0" id="service-delivery" required />
              </label>
            </div>
            <label>
              Categoria
              <select id="service-category" required></select>
            </label>
            <label>
              Habilidades / Tags
              <input class="input" id="service-tags" placeholder="ex: front-end, react, ui" />
            </label>
            <button class="btn btn-primary" type="submit">Salvar serviço</button>
            <button class="btn btn-outline" type="button" id="btn-cancel-edit" style="display:none">Cancelar edição</button>
          </form>
        </aside>
      </section>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
