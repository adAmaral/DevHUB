<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Marketplace — Summit</title>
  <link rel="stylesheet" href="assets/css/theme.css"/>
</head>
<body>
  <header class="navbar">
    <div class="container inner">
      <a class="brand" href="index.html"><span class="dot"></span>Summit</a>
      <div class="searchbar" style="flex:1; margin: 0 1rem;">
        <input class="input" id="search" placeholder="Buscar serviços, produtos ou perfis"/>
        <button class="btn btn-primary" onclick="Summit.search()">Buscar</button>
      </div>
      <nav style="display:flex; gap:.6rem">
        <a class="btn btn-outline" href="auth.html">Minha conta</a>
        <a class="btn btn-primary" href="#">Publicar</a>
      </nav>
    </div>
  </header>

  <main class="container market-layout">
    <aside class="sidebar">
      <h3 style="margin-top:0">Filtros</h3>
      <div class="form">
        <select class="input" id="f-cat">
          <option value="">Categoria</option>
          <option>Design</option>
          <option>Programação</option>
          <option>Marketing</option>
          <option>Comércio</option>
        </select>
        <select class="input" id="f-type">
          <option value="">Tipo</option>
          <option>Serviço</option>
          <option>Produto</option>
        </select>
        <select class="input" id="f-order">
          <option value="">Ordenar por</option>
          <option>Mais recentes</option>
          <option>Melhor avaliados</option>
          <option>Menor preço</option>
          <option>Maior preço</option>
        </select>
        <button class="btn btn-outline" onclick="Summit.applyFilters()">Aplicar filtros</button>
      </div>
      <hr style="margin:1rem 0; border:none; border-top:1px solid #edf1ff"/>
      <p style="font-size:.92rem; color:#4a4f58">Dica: use os filtros para refinar sua busca e salve palavras-chave.</p>
    </aside>

    <section>
      <h2 style="margin-top:0">Destaques</h2>
      <div class="grid-cards" id="cards">
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container" style="padding:1.2rem 0; display:flex; gap:1rem; justify-content:space-between; align-items:center;">
      <small>© 2025 Summit. Todos os direitos reservados.</small>
      <div style="display:flex; gap:.6rem">
        <a href="index.html">Sobre</a>
        <a href="auth.html">Conta</a>
      </div>
    </div>
  </footer>
  <script src="assets/js/app.js"></script>
</body>
</html>
