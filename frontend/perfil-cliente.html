<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Perfil - Cliente</title>
  <link rel="stylesheet" href="assets/css/theme.css"/>
  <style>
    .profile-view-section, .profile-edit-section {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 8px;
      background-color: #fff;
    }
    .profile-view-section h3, .profile-edit-section h3 {
      margin-top: 0;
      color: #333;
    }
    .profile-info p {
      margin: 5px 0;
      font-size: 1.1em;
      color: #555;
    }
    .profile-info strong {
      color: #333;
      display: inline-block;
      width: 120px;
    }
    .profile-picture-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-picture-container img {
      border: 2px solid #ddd;
      padding: 3px;
    }
    .profile-picture-container button {
      margin-top: 10px;
    }
    .form label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    .form input, .form textarea {
      width: calc(100% - 22px);
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .form textarea {
      resize: vertical;
    }
    .btn-settings {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      margin-bottom: 20px;
    }
    .btn-settings:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
<header class="navbar">
  <div class="container inner">
    <a class="brand" href="index.html">
      <span class="dot"></span>
        <span>DevHub</span>
    </a>
    <nav style="display:flex; gap:1rem; align-items:center">
      <a class="btn btn-outline" href="marketplace.html">Marketplace</a>
      <a class="btn btn-primary" href="perfil-cliente.html">Meu Perfil</a>
      <button class="btn btn-outline" onclick="DevHubAuth.logout()">Sair</button>
    </nav>
  </div>
</header>
<main class="container section">
  <h2>Bem-vindo, <span id="nome-display"></span></h2>

  <button class="btn btn-settings" onclick="toggleEditMode()">Configurações</button>

  <div id="view-mode" class="profile-view-section">
    <h3>Seu Perfil</h3>
    <div class="profile-picture-container">
      <img id="profile-pic-view" src="assets/img/placeholder-hero.png" alt="Foto de perfil" style="width:120px;height:120px;border-radius:50%;object-fit:cover;">
    </div>
    <div class="profile-info">
      <p><strong>Nome:</strong> <span id="view-nome"></span></p>
      <p><strong>Contato:</strong> <span id="view-contato"></span></p>
      <p><strong>Site:</strong> <span id="view-site"></span></p>
      <p><strong>Biografia:</strong> <span id="view-biografia"></span></p>
      <p><strong>Itens Principais:</strong> <span id="view-itens-principais"></span></p>
      <p><strong>E-mail:</strong> <span id="view-email"></span></p>
    </div>
  </div>

  <div id="edit-mode" class="profile-edit-section" style="display:none;">
    <h3>Editar Perfil</h3>
    <div class="profile-picture-container">
      <img id="profile-pic-edit" src="assets/img/placeholder-hero.png" alt="Foto de perfil" style="width:120px;height:120px;border-radius:50%;object-fit:cover;">
      <input type="file" id="upload-pic" accept="image/*" style="display:none;">
      <button class="btn btn-sm" onclick="document.getElementById('upload-pic').click();">Alterar Foto</button>
    </div>
    <div class="form" style="max-width:420px">
      <label for="cfg-nome">Nome Principal:</label>
      <input id="cfg-nome" class="input" placeholder="Seu nome">
      <label for="cfg-contato">Contato:</label>
      <input id="cfg-contato" class="input" placeholder="Seu contato (telefone, email alternativo)">
      <label for="cfg-site">Site/Portfólio:</label>
      <input id="cfg-site" class="input" placeholder="Link para seu site ou portfólio">
      <label for="cfg-biografia">Biografia:</label>
      <textarea id="cfg-biografia" class="input" placeholder="Fale um pouco sobre você..." rows="4"></textarea>
      <label for="cfg-itens-principais">Itens Principais (separados por vírgula):</label>
      <input id="cfg-itens-principais" class="input" placeholder="Ex: Designer, Marketing, Vendas">
      <label for="cfg-email">E-mail:</label>
      <input id="cfg-email" class="input" type="email" placeholder="Seu e-mail">
      <label for="cfg-senha">Senha:</label>
      <input id="cfg-senha" class="input" type="password" placeholder="Nova senha">
      <button class="btn btn-outline" onclick="salvarCfg()">Salvar alterações</button>
      <button class="btn btn-outline" onclick="toggleEditMode()">Cancelar</button>
    </div>
  </div>
  <h3>Seus favoritos</h3><div id="favoritos"></div>
  <h3>Compras recentes</h3><div id="compras"></div>
</main>
<script src="assets/js/app.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('devhubCurrentUser')||"null");
  if (!user) {
    window.location.href = 'auth.html';
  } else if (user.tipo && user.tipo !== 'cliente') {
    window.location.href = `perfil-${user.tipo}.html`;
  }
  
  function loadProfileData() {
    if (user) {
      document.getElementById('nome-display').textContent = user.nome || user.email;

      // View Mode
      document.getElementById('profile-pic-view').src = user.profilePic || 'assets/img/placeholder-hero.png';
      document.getElementById('view-nome').textContent = user.nome || 'Não informado';
      document.getElementById('view-contato').textContent = user.contato || 'Não informado';
      document.getElementById('view-site').textContent = user.site || 'Não informado';
      document.getElementById('view-biografia').textContent = user.biografia || 'Não informado';
      document.getElementById('view-itens-principais').textContent = user.itensPrincipais ? user.itensPrincipais.join(", ") : 'Não informado';
      document.getElementById('view-email').textContent = user.email || 'Não informado';

      // Edit Mode
      document.getElementById('profile-pic-edit').src = user.profilePic || 'assets/img/placeholder-hero.png';
      document.getElementById('cfg-nome').value = user.nome || '';
      document.getElementById('cfg-email').value = user.email || '';
      document.getElementById('cfg-contato').value = user.contato || '';
      document.getElementById('cfg-site').value = user.site || '';
      document.getElementById('cfg-biografia').value = user.biografia || '';
      document.getElementById('cfg-itens-principais').value = user.itensPrincipais ? user.itensPrincipais.join(", ") : '';
    }
  }

  document.getElementById('upload-pic').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('profile-pic-view').src = e.target.result;
        document.getElementById('profile-pic-edit').src = e.target.result;
        const u = JSON.parse(localStorage.getItem('devhubCurrentUser'));
        u.profilePic = e.target.result;
        localStorage.setItem('devhubCurrentUser', JSON.stringify(u));
      };
      reader.readAsDataURL(file);
    }
  });

  function salvarCfg(){
    const u = JSON.parse(localStorage.getItem('devhubCurrentUser'));
    u.nome = document.getElementById('cfg-nome').value || u.nome;
    u.email = document.getElementById('cfg-email').value || u.email;
    const novaSenha = document.getElementById('cfg-senha').value;
    if (novaSenha) {
      u.senha = novaSenha;
    }
    u.contato = document.getElementById('cfg-contato').value;
    u.site = document.getElementById('cfg-site').value;
    u.biografia = document.getElementById('cfg-biografia').value;
    u.itensPrincipais = document.getElementById('cfg-itens-principais').value.split(',').map(item => item.trim()).filter(item => item !== '');
    localStorage.setItem('devhubCurrentUser', JSON.stringify(u));
    alert('Atualizado!');
    loadProfileData(); // Recarregar dados para o modo de visualização
    toggleEditMode(); // Voltar para o modo de visualização
  }

  function toggleEditMode() {
    const viewMode = document.getElementById('view-mode');
    const editMode = document.getElementById('edit-mode');
    if (viewMode.style.display === 'none') {
      viewMode.style.display = 'block';
      editMode.style.display = 'none';
    } else {
      viewMode.style.display = 'none';
      editMode.style.display = 'block';
      // Preencher os campos de edição com os dados atuais antes de mostrar
      loadProfileData(); 
    }
  }

  // Carregar dados iniciais ao carregar a página
  loadProfileData();
</script>
</body>
</html>
