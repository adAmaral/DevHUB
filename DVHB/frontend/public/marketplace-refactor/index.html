<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace de Softwares</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__content">
        <h1 class="brand">DevHub Marketplace</h1>
        <button id="themeToggle" class="btn btn--ghost" type="button">Alternar tema</button>
      </div>
    </header>

    <main class="container layout">
      <section class="panel panel--filters" aria-label="Filtros de produtos">
        <h2>Buscar e filtrar</h2>

        <label class="field">
          <span>Busca por nome ou descrição</span>
          <input id="searchInput" type="search" placeholder="Ex: CRM, analytics..." />
        </label>

        <label class="field">
          <span>Preço máximo</span>
          <input id="priceInput" type="range" min="0" max="500" step="10" value="500" />
          <strong id="priceLabel">Até $500</strong>
        </label>

        <button id="clearFiltersBtn" class="btn btn--secondary" type="button">Limpar filtros</button>
      </section>

      <section class="panel panel--catalog" aria-label="Lista de produtos">
        <div class="catalog__header">
          <h2>Produtos</h2>
          <p id="resultCount">0 resultados</p>
        </div>
        <div id="productGrid" class="grid"></div>
        <p id="emptyState" class="empty-state" hidden>Nenhum produto encontrado com os filtros atuais.</p>
      </section>

      <aside class="panel panel--cart" aria-label="Resumo do carrinho">
        <h2>Carrinho</h2>
        <ul id="cartList" class="cart-list"></ul>
        <div class="cart-summary">
          <p>Itens: <strong id="cartCount">0</strong></p>
          <p>Total: <strong id="cartTotal">$0.00</strong></p>
        </div>
      </aside>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
