<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEVHUB - Entrar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-center page-background">
    <section class="card auth-card">
      <div class="brand">
        <div class="brand-icon">📘</div>
        <h1>DevHub</h1>
      </div>
      <h2 class="title">Entrar</h2>
      <p class="subtitle">Bem-vindo de volta ao DevHub</p>

      <form id="loginForm" class="form" action="#" method="post" novalidate>
        <div id="errorMessage" class="form-error" role="alert" aria-live="assertive" hidden></div>

        <div class="form-group">
          <label for="email">Endereço de E-mail</label>
          <input id="email" name="email" type="email" placeholder="E-mail" required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="Digite sua senha" required />
          <a href="#" class="text-link link-sm">Esqueceu a senha?</a>
        </div>

        <div class="form-group form-row form-row-between">
          <label class="checkbox-label" for="remember">
            <input id="remember" type="checkbox" name="remember" />
            Manter-me conectado
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <div class="divider">OU CONTINUE COM</div>

      <div class="social-row">
        <a class="btn btn-outlined" href="#">Google <img src="google-icon.png"></a>
        <a class="btn btn-outlined" href="#">GitHub <img src="github-icon.png"></a>
      </div>

      <p class="helptext">Não tem uma conta? <a class="text-link" href="#">Cadastre-se</a></p>

      <footer class="footer-links">
        <a href="#">Política de Privacidade</a>
        <a href="#">Termos de Serviço</a>
        <a href="#">Central de Ajuda</a>
      </footer>
    </section>
  </main>
  <script src="login.js"></script>
</body>
</html>
