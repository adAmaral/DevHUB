<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevHub477 | Marketplace</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand">DevHub477</div>
      <div class="row">
        <span id="sessionBox" class="small">Não autenticado</span>
        <a class="btn btn-secondary" href="./produto.html?id=1">Produto exemplo</a>
        <span class="btn btn-primary">Carrinho: <span data-cart-badge>0</span></span>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Marketplace de Softwares</h1>

    <div class="toolbar">
      <input id="searchInput" class="input" placeholder="Buscar produto..." />
      <select class="select">
        <option>Ordenar por</option>
        <option>Preço</option>
        <option>Nome</option>
      </select>
    </div>

    <section id="productsContainer" class="grid products"></section>

    <h2 class="section-title">Autenticação (mock)</h2>
    <div class="two-col">
      <form id="loginForm" class="card form">
        <h3>Login</h3>
        <input class="input" name="email" type="email" placeholder="email" required />
        <input class="input" name="senha" type="password" placeholder="senha" required />
        <button class="btn btn-primary" type="submit">Entrar</button>
      </form>

      <form id="registerForm" class="card form">
        <h3>Cadastro</h3>
        <input class="input" name="nome" placeholder="nome" required />
        <input class="input" name="email" type="email" placeholder="email" required />
        <input class="input" name="senha" type="password" placeholder="senha" required />
        <button class="btn btn-secondary" type="submit">Cadastrar</button>
      </form>
    </div>

    <p id="authFeedback" class="message info">Pronto para autenticação mockada.</p>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
