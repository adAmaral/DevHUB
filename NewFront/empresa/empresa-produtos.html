<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Meus Produtos - Empresa</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
    <div class="relative flex min-h-screen w-full">
        <!-- SideNavBar -->
        <aside class="flex w-64 flex-col border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-background-dark p-4">
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 bg-gray-200 dark:bg-gray-700"></div>
                    <div class="flex flex-col">
                        <h1 class="text-gray-900 dark:text-white text-base font-medium leading-normal" id="nomeEmpresa">Nome da Empresa</h1>
                        <p class="text-primary text-sm font-medium leading-normal">Plano Premium</p>
                    </div>
                </div>
                <nav class="flex flex-col gap-2 mt-4">
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="empresa-dashboard.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">dashboard</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Dashboard</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="../shared/marketplace.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">store</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Marketplace</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="empresa-vendas.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">trending_up</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Vendas</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="empresa-pedidos.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">receipt_long</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Meus Pedidos</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="empresa-chat.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">chat</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Chat</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 group" href="empresa-equipe.html">
                        <span class="material-symbols-outlined text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">groups</span>
                        <p class="text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white text-sm font-medium leading-normal">Equipe</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 dark:bg-primary/20" href="empresa-produtos.html">
                        <span class="material-symbols-outlined text-primary dark:text-white" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
                        <p class="text-primary dark:text-white text-sm font-bold leading-normal">Produtos</p>
                    </a>
                </nav>
            </div>
            <div class="mt-auto">
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800/50" href="#" onclick="sair(); return false;">
                    <span class="material-symbols-outlined">logout</span>
                    <p class="text-sm font-medium leading-normal">Sair</p>
                </a>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <!-- PageHeading -->
                <div class="flex flex-wrap justify-between gap-3 items-center mb-6">
                    <div class="flex min-w-72 flex-col gap-2">
                        <p class="text-gray-900 dark:text-white text-3xl font-bold leading-tight">Meus Produtos</p>
                        <p class="text-gray-500 dark:text-gray-400 text-base font-normal leading-normal">Gerencie seus serviços e produtos oferecidos.</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="abrirModalProduto()" class="flex items-center justify-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:bg-primary/90">
                            <span class="material-symbols-outlined" style="font-size: 20px;">add</span>
                            Novo Produto
                        </button>
                    </div>
                </div>
                <!-- Products Grid -->
                <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Produtos serão carregados dinamicamente aqui -->
                </div>
            </div>
        </main>
    </div>
    <!-- Modal Novo Produto -->
    <div id="modalProduto" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-900 rounded-xl p-6 w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Novo Produto</h3>
                <button onclick="fecharModalProduto()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form onsubmit="salvarProduto(event)" class="flex flex-col gap-4">
                <input type="text" id="produtoNome" placeholder="Nome do Produto/Serviço" required class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"/>
                <textarea id="produtoDescricao" placeholder="Descrição do produto/serviço" rows="3" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                <select id="produtoCategoria" required class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="">Selecione a Categoria</option>
                    <option value="Design Gráfico">Design Gráfico</option>
                    <option value="Desenvolvimento Web">Desenvolvimento Web</option>
                    <option value="Redação & Tradução">Redação & Tradução</option>
                    <option value="Marketing Digital">Marketing Digital</option>
                    <option value="Edição de Vídeo">Edição de Vídeo</option>
                </select>
                <input type="text" id="produtoTags" placeholder="Tags (separadas por vírgula, ex: web, responsivo, landing page)" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"/>
                <input type="number" id="produtoPreco" placeholder="Preço (R$)" step="0.01" required class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"/>
                <input type="url" id="produtoImagem" placeholder="URL da Imagem (opcional)" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary"/>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="preencherDadosAleatorios()" class="px-4 py-2 rounded-lg bg-yellow-500 text-white hover:bg-yellow-600 font-medium text-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-base">auto_fix_high</span>
                        Dados Aleatórios
                    </button>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="fecharModalProduto()" class="flex-1 px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 font-medium">Cancelar</button>
                    <button type="submit" class="flex-1 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary/90 font-medium">Salvar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../auth.js"></script>
    <script src="../products.js"></script>
    <script>
        let produtoEditando = null;

        // Função helper para carregar imagem com fallback
        function carregarImagemComFallback(elemento, url, fallback) {
            const defaultFallback = 'https://via.placeholder.com/400x300?text=Produto';
            const imagemUrl = url && url.trim() !== '' ? url.trim() : null;
            const fallbackUrl = fallback || defaultFallback;
            
            // Aplicar fallback imediatamente
            elemento.style.backgroundImage = `url('${fallbackUrl}')`;
            elemento.style.backgroundSize = 'cover';
            elemento.style.backgroundPosition = 'center';
            elemento.style.backgroundRepeat = 'no-repeat';
            
            if (!imagemUrl) return;
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                elemento.style.backgroundImage = `url('${imagemUrl}')`;
            };
            img.onerror = function() {
                console.log('Erro ao carregar imagem:', imagemUrl);
            };
            try {
                img.src = imagemUrl;
            } catch (e) {
                console.log('Erro ao definir src da imagem:', e);
            }
        }

        function abrirModalProduto() {
            document.getElementById('modalProduto').classList.remove('hidden');
            document.getElementById('modalProduto').classList.add('flex');
            document.getElementById('modalProduto').querySelector('h3').textContent = 'Novo Produto';
            document.getElementById('produtoNome').value = '';
            document.getElementById('produtoDescricao').value = '';
            document.getElementById('produtoCategoria').value = '';
            document.getElementById('produtoTags').value = '';
            document.getElementById('produtoPreco').value = '';
            document.getElementById('produtoImagem').value = '';
            produtoEditando = null;
        }

        function fecharModalProduto() {
            document.getElementById('modalProduto').classList.add('hidden');
            document.getElementById('modalProduto').classList.remove('flex');
        }

        function preencherDadosAleatorios() {
            const nomes = [
                'Sistema de Gerenciamento Empresarial',
                'Consultoria em Marketing Digital',
                'Desenvolvimento de E-commerce',
                'Plataforma de Gestão de Projetos',
                'Serviço de Design Gráfico',
                'API de Integração de Sistemas',
                'Solução de Business Intelligence',
                'App Mobile Personalizado',
                'Site Institucional Profissional',
                'Serviço de SEO Avançado'
            ];
            
            const descricoes = [
                'Solução completa e profissional para otimização de processos empresariais com relatórios detalhados e analytics avançado.',
                'Estratégias personalizadas de marketing digital para aumentar sua presença online e gerar mais leads qualificados.',
                'Plataforma robusta de e-commerce com carrinho de compras, gateway de pagamento e painel administrativo completo.',
                'Ferramenta completa de gestão de projetos com kanban, timeline e acompanhamento de equipe em tempo real.',
                'Criação de identidade visual profissional incluindo logotipo, manual de marca e aplicações para diferentes mídias.',
                'API RESTful robusta para integração de sistemas com documentação completa e suporte técnico especializado.',
                'Plataforma de análise de dados com dashboards interativos e relatórios executivos automatizados.',
                'Aplicativo mobile nativo para iOS e Android com design moderno e integração com APIs existentes.',
                'Website institucional responsivo com design moderno, SEO otimizado e integração com redes sociais.',
                'Serviço completo de otimização para mecanismos de busca com análise de palavras-chave e relatórios mensais.'
            ];
            
            const categorias = [
                'Design Gráfico',
                'Desenvolvimento Web',
                'Redação & Tradução',
                'Marketing Digital',
                'Edição de Vídeo'
            ];
            
            const tagsPorCategoria = {
                'Design Gráfico': ['logo', 'branding', 'identidade visual', 'flyer', 'banner'],
                'Desenvolvimento Web': ['web', 'responsive', 'frontend', 'backend', 'fullstack'],
                'Redação & Tradução': ['conteúdo', 'SEO', 'artigos', 'blog', 'copywriting'],
                'Marketing Digital': ['SEO', 'social media', 'anúncios', 'campanhas', 'analytics'],
                'Edição de Vídeo': ['vídeo', 'edição', 'motion graphics', 'animações', 'produção']
            };
            
            const imagens = [
                'https://via.placeholder.com/800x600/135bec/ffffff?text=Produto+1',
                'https://via.placeholder.com/800x600/10b981/ffffff?text=Produto+2',
                'https://via.placeholder.com/800x600/ef4444/ffffff?text=Produto+3',
                'https://via.placeholder.com/800x600/f59e0b/ffffff?text=Produto+4',
                'https://via.placeholder.com/800x600/8b5cf6/ffffff?text=Produto+5'
            ];
            
            const nomeAleatorio = nomes[Math.floor(Math.random() * nomes.length)];
            const descricaoAleatoria = descricoes[Math.floor(Math.random() * descricoes.length)];
            const categoriaAleatoria = categorias[Math.floor(Math.random() * categorias.length)];
            const tagsAleatorias = tagsPorCategoria[categoriaAleatoria];
            const tagsSelecionadas = tagsAleatorias.slice(0, Math.floor(Math.random() * 3) + 2).join(', ');
            const precoAleatorio = (Math.random() * 9000 + 100).toFixed(2);
            const imagemAleatoria = imagens[Math.floor(Math.random() * imagens.length)];
            
            document.getElementById('produtoNome').value = nomeAleatorio;
            document.getElementById('produtoDescricao').value = descricaoAleatoria;
            document.getElementById('produtoCategoria').value = categoriaAleatoria;
            document.getElementById('produtoTags').value = tagsSelecionadas;
            document.getElementById('produtoPreco').value = precoAleatorio;
            document.getElementById('produtoImagem').value = imagemAleatoria;
        }

        function salvarProduto(e) {
            e.preventDefault();
            
            const session = authService.getSession();
            if (!session) {
                alert('Erro: Sessão não encontrada. Faça login novamente.');
                return;
            }
            
            const user = authService.getCurrentUser();
            if (!user) {
                alert('Erro: Usuário não encontrado. Faça login novamente.');
                return;
            }
            
            const nome = document.getElementById('produtoNome').value.trim();
            const descricao = document.getElementById('produtoDescricao').value.trim();
            const categoria = document.getElementById('produtoCategoria').value;
            const tagsInput = document.getElementById('produtoTags').value.trim();
            const preco = parseFloat(document.getElementById('produtoPreco').value);
            const imagem = document.getElementById('produtoImagem').value.trim();
            
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            const productData = {
                nome: nome,
                descricao: descricao,
                categoria: categoria,
                tags: tags,
                preco: preco,
                imagem: imagem || undefined,
                vendedorId: user.id,
                vendedorNome: user.nomeEmpresa || user.nome || 'Empresa',
                vendedorTipo: user.accountType
            };
            
            if (produtoEditando) {
                const result = productService.updateProduct(produtoEditando, productData);
                if (result.success) {
                    alert('Produto atualizado com sucesso!');
                    fecharModalProduto();
                    carregarProdutos();
                } else {
                    alert(result.message);
                }
            } else {
                const result = productService.createProduct(productData);
                if (result.success) {
                    alert(result.message);
                    fecharModalProduto();
                    carregarProdutos();
                } else {
                    alert(result.message);
                }
            }
        }

        function carregarProdutos() {
            const session = authService.getSession();
            if (!session) return;
            
            const user = authService.getCurrentUser();
            if (!user) return;
            
            const produtos = productService.getProductsByVendor(user.id);
            const grid = document.getElementById('productsGrid');
            
            if (!grid) return;
            
            grid.innerHTML = '';
            
            if (produtos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500 dark:text-gray-400">Nenhum produto cadastrado ainda. Clique em "Novo Produto" para começar!</div>';
                return;
            }
            
            produtos.forEach(produto => {
                const card = criarCardProduto(produto);
                grid.appendChild(card);
            });
        }

        function criarCardProduto(produto) {
            const div = document.createElement('div');
            div.className = 'flex flex-col rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-background-dark overflow-hidden hover:shadow-lg transition-shadow';
            
            // Criar elemento de imagem
            const imagemDiv = document.createElement('div');
            imagemDiv.className = 'aspect-video w-full bg-cover bg-center bg-gray-200 dark:bg-gray-700';
            carregarImagemComFallback(imagemDiv, produto.imagem);
            
            div.innerHTML = `
                <div class="p-5 flex flex-col gap-3">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white">${produto.nome}</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">${produto.descricao || 'Sem descrição'}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-lg text-[#FFD700]">star</span>
                            <span class="font-bold text-gray-900 dark:text-white">${produto.rating || '0.0'}</span>
                            <span class="text-sm text-gray-500 dark:text-gray-400">(${produto.avaliacoes || 0})</span>
                        </div>
                        <p class="text-base font-bold text-primary">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="editarProduto('${produto.id}')" class="flex-1 px-3 py-2 rounded-lg bg-primary/10 text-primary hover:bg-primary/20 text-sm font-medium">Editar</button>
                        <button onclick="removerProduto('${produto.id}')" class="flex-1 px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 text-sm font-medium">Remover</button>
                    </div>
                </div>
            `;
            
            // Inserir imagem no início
            div.insertBefore(imagemDiv, div.firstChild);
            
            return div;
        }

        function editarProduto(id) {
            const produto = productService.getProducts().find(p => p.id === id);
            if (!produto) return;
            
            produtoEditando = id;
            document.getElementById('modalProduto').classList.remove('hidden');
            document.getElementById('modalProduto').classList.add('flex');
            document.getElementById('modalProduto').querySelector('h3').textContent = 'Editar Produto';
            document.getElementById('produtoNome').value = produto.nome;
            document.getElementById('produtoDescricao').value = produto.descricao || '';
            document.getElementById('produtoCategoria').value = produto.categoria;
            document.getElementById('produtoTags').value = produto.tags.join(', ');
            document.getElementById('produtoPreco').value = produto.preco;
            document.getElementById('produtoImagem').value = produto.imagem || '';
        }

        function removerProduto(id) {
            if (confirm('Tem certeza que deseja remover este produto?')) {
                const result = productService.deleteProduct(id);
                if (result.success) {
                    alert(result.message);
                    carregarProdutos();
                }
            }
        }

        function sair() {
            if (confirm('Tem certeza que deseja sair?')) {
                authService.logout();
                window.location.href = '../shared/cadastro.html';
            }
        }

        // Proteção de rota - apenas empresas podem acessar
        if (!authService.protectRoute('empresa')) {
            // Redirecionamento automático já foi feito pelo protectRoute
        }

        // Carregar dados do usuário
        function carregarDadosUsuario() {
            const user = authService.getCurrentUser();
            if (!user) return;

            // Preencher informações no sidebar
            const nomeElement = document.getElementById('nomeEmpresa');
            const planoElement = document.querySelector('aside p');
            
            if (nomeElement) {
                nomeElement.textContent = user.nomeEmpresa || user.nome || 'Nome da Empresa';
            }
            if (planoElement) {
                planoElement.textContent = 'Plano Premium';
            }
        }

        // Carregar produtos ao iniciar
        document.addEventListener('DOMContentLoaded', function() {
            carregarDadosUsuario();
            carregarProdutos();
        });
    </script>
</body>
</html>
