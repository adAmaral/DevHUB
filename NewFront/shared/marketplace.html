// Função para toggle do dropdown
function toggleDropdownPerfil() {

// Função para toggle do dropdown de categorias
function toggleCategoryDropdown() {

}

// Função para atualizar o texto do botão de categorias
function atualizarTextoCategorias() {
    const checkboxes = document.querySelectorAll('.filter-category:checked');
    const selectedText = document.getElementById('categorySelectedText');
    
    if (checkboxes.length === 0) {
        selectedText.textContent = 'Selecione categorias';
    } else if (checkboxes.length === 1) {
        selectedText.textContent = checkboxes[0].value;
    } else {
        selectedText.textContent = `${checkboxes.length} categorias selecionadas`;
    }
}

// Fechar dropdown ao clicar fora
document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('dropdownPerfil');
    const button = document.getElementById('profileDropdown');
    if (!button.contains(event.target)) {
        dropdown.classList.add('hidden');
    }
    
    // Fechar dropdown de categorias ao clicar fora
    const categoryDropdown = document.getElementById('categoryDropdown');
    const categoryButton = document.getElementById('categoryDropdownBtn');
    const categoryContainer = categoryButton ? categoryButton.closest('.relative') : null;
    if (categoryDropdown && categoryContainer && !categoryContainer.contains(event.target)) {
        categoryDropdown.classList.add('hidden');
    }
});

// Função de logout

    }
}

// Sistema de Filtros e Paginação
let selectedRating = null;
let currentPage = 1;
const itemsPerPage = 6; // Mostrar 6 produtos por página
let allProducts = []; // Array com todos os produtos carregados

// Função para carregar produtos do localStorage
function carregarProdutosDoStorage() {
    allProducts = productService.getActiveProducts();

// Função para criar card de produto
function criarCardProduto(produto) {
    const div = document.createElement('div');
    div.className = 'service-card group flex flex-col overflow-hidden rounded-xl bg-card-light dark:bg-card-dark border border-border-light dark:border-border-dark transition-shadow hover:shadow-lg cursor-pointer';
    div.setAttribute('data-category', produto.categoria);
    div.setAttribute('data-price', produto.preco);
    div.setAttribute('data-rating', produto.rating || 0);
    div.setAttribute('data-product-id', produto.id);
    
    // Adicionar evento de clique para redirecionar
    div.addEventListener('click', function() {
        window.location.href = `produto-detalhes.html?id=${produto.id}`;
    });
    
    // Criar estrelas baseado na avaliação
    const rating = produto.rating || 0;
    const stars = [];
    for (let i = 0; i < 5; i++) {
        if (i < Math.floor(rating)) {
            stars.push('<span class="material-symbols-outlined text-lg text-[#FFD700]">star</span>');
        } else if (i === Math.floor(rating) && rating % 1 >= 0.5) {
            stars.push('<span class="material-symbols-outlined text-lg text-[#FFD700]">star</span>');
        } else {
            stars.push('<span class="material-symbols-outlined text-lg text-border-light dark:text-border-dark">star</span>');
        }
    }
    
    // Criar elemento de imagem com tratamento de erro
    const imagemDiv = document.createElement('div');
    imagemDiv.className = 'aspect-video w-full bg-cover bg-center';
    imagemDiv.setAttribute('data-alt', produto.nome);
    
    // Obter imagem padrão baseada na categoria se não houver URL
    const getDefaultImageByCategory = (cat) => {
        const defaultImages = {
            'Design Gráfico': 'https://via.placeholder.com/400x300/6366f1/ffffff?text=Design+Gráfico',
            'Desenvolvimento Web': 'https://via.placeholder.com/400x300/10b981/ffffff?text=Desenvolvimento+Web',
            'Redação & Tradução': 'https://via.placeholder.com/400x300/f59e0b/ffffff?text=Redação+%26+Tradução',
            'Marketing Digital': 'https://via.placeholder.com/400x300/ef4444/ffffff?text=Marketing+Digital',
            'Edição de Vídeo': 'https://via.placeholder.com/400x300/8b5cf6/ffffff?text=Edição+de+Vídeo'
        };
        return defaultImages[cat] || 'https://via.placeholder.com/400x300/6b7280/ffffff?text=Produto';
    };
    
    // Garantir que o produto tenha imagem (usar a do produto ou padrão baseada na categoria)
    const imagemProduto = produto.imagem && produto.imagem.trim() !== '' 
        ? produto.imagem.trim() 
        : getDefaultImageByCategory(produto.categoria);
    
    // Aplicar imagem imediatamente
    imagemDiv.style.backgroundImage = `url('${imagemProduto}')`;
    imagemDiv.style.backgroundSize = 'cover';
    imagemDiv.style.backgroundPosition = 'center';
    imagemDiv.style.backgroundRepeat = 'no-repeat';
    
    // Se houver URL personalizada, tentar carregar (pode substituir a padrão se carregar com sucesso)
    if (produto.imagem && produto.imagem.trim() !== '' && produto.imagem.trim() !== imagemProduto) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = function() {
            imagemDiv.style.backgroundImage = `url('${produto.imagem.trim()}')`;
        };
        
        img.onerror = function() {
            // Manter imagem padrão (já está aplicada)
            console.log('Erro ao carregar imagem:', produto.imagem);
        };
        
        try {
            img.src = produto.imagem.trim();
        } catch (e) {
            console.log('Erro ao definir src da imagem:', e);
        }
    }
    
    div.innerHTML = `
        <div class="flex flex-col gap-4 p-5">
            <h3 class="text-lg font-bold text-text-light dark:text-text-dark group-hover:text-primary transition-colors">${produto.nome}</h3>
            <p class="text-sm text-subtext-light dark:text-subtext-dark">por ${produto.vendedorNome}</p>
            <div class="flex items-center justify-between mt-2">
                <div class="flex items-center gap-1">
                    ${stars.join('')}
                    <span class="font-bold text-text-light dark:text-text-dark">${rating.toFixed(1)}</span>
                    <span class="text-sm text-subtext-light dark:text-subtext-dark">(${produto.avaliacoes || 0})</span>
                </div>
                <p class="text-base font-bold text-text-light dark:text-text-dark">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
            </div>
        </div>
    `;
    // Inserir a imagem no início do div
    div.insertBefore(imagemDiv, div.firstChild);
    return div;
}

// Função para renderizar produtos no grid
function renderizarProdutos() {
    const servicesGrid = document.getElementById('servicesGrid');
    if (!servicesGrid) return;
    
    servicesGrid.innerHTML = '';
    
    if (allProducts.length === 0) {
        servicesGrid.innerHTML = '<div class="col-span-full text-center py-8 text-subtext-light dark:text-subtext-dark">Nenhum produto encontrado.</div>';
        atualizarContadorResultados(0);
        atualizarPagina(0);
        return;
    }
    
    allProducts.forEach(produto => {
        const card = criarCardProduto(produto);
        servicesGrid.appendChild(card);
    });
    
    // Aplicar filtros e paginação
    aplicarFiltros();
}

// Função para ordenar os cards (mantida para compatibilidade)
function ordenarCards(cards) {
    const sortSelect = document.getElementById('sortSelect');
    const sortValue = sortSelect ? sortSelect.value : 'relevantes';
    
    const cardsArray = Array.from(cards);
    
    switch(sortValue) {
        case 'maior-preco':
            cardsArray.sort((a, b) => {
                const priceA = parseFloat(a.getAttribute('data-price'));
                const priceB = parseFloat(b.getAttribute('data-price'));
                return priceB - priceA; // Maior para menor
            });
            break;
            
        case 'menor-preco':
            cardsArray.sort((a, b) => {
                const priceA = parseFloat(a.getAttribute('data-price'));
                const priceB = parseFloat(b.getAttribute('data-price'));
                return priceA - priceB; // Menor para maior
            });
            break;
            
        case 'melhores-avaliacoes':
            cardsArray.sort((a, b) => {
                const ratingA = parseFloat(a.getAttribute('data-rating'));
                const ratingB = parseFloat(b.getAttribute('data-rating'));
                return ratingB - ratingA; // Maior avaliação primeiro
            });
            break;
            
        case 'relevantes':
        default:
            // Manter ordem original (relevância padrão)
            break;
    }
    
    return cardsArray;
}

// Função para obter cards visíveis após filtros
function obterCardsVisiveis() {
    const categoryCheckboxes = document.querySelectorAll('.filter-category:checked');
    const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
    const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
    
    // Obter categorias selecionadas
    const selectedCategories = Array.from(categoryCheckboxes).map(cb => cb.value);
    
    // Filtrar produtos baseado nos critérios
    let visibleProducts = allProducts.filter(produto => {
        // Verificar categoria
        const categoryMatch = selectedCategories.length === 0 || selectedCategories.includes(produto.categoria);
        
        // Verificar preço
        const priceMatch = produto.preco >= priceMin && produto.preco <= priceMax;
        
        // Verificar avaliação
        const ratingMatch = selectedRating === null || (produto.rating || 0) >= selectedRating;
        
        return categoryMatch && priceMatch && ratingMatch;
    });
    
    // Ordenar produtos
    visibleProducts = ordenarProdutos(visibleProducts);
    
    // Renderizar cards filtrados
    const servicesGrid = document.getElementById('servicesGrid');
    if (servicesGrid) {
        servicesGrid.innerHTML = '';
        visibleProducts.forEach(produto => {
            const card = criarCardProduto(produto);
            card.style.display = 'none'; // Esconder inicialmente para paginação
            servicesGrid.appendChild(card);
        });
    }
    
    // Retornar cards do DOM para compatibilidade com código existente
    return Array.from(document.querySelectorAll('.service-card'));
}

// Função para ordenar produtos (similar à ordenarCards mas para produtos)
function ordenarProdutos(produtos) {
    const sortSelect = document.getElementById('sortSelect');
    const sortValue = sortSelect ? sortSelect.value : 'relevantes';
    
    const produtosArray = [...produtos];
    
    switch(sortValue) {
        case 'maior-preco':
            produtosArray.sort((a, b) => b.preco - a.preco);
            break;
            
        case 'menor-preco':
            produtosArray.sort((a, b) => a.preco - b.preco);
            break;
            
        case 'melhores-avaliacoes':
            produtosArray.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            break;
            
        case 'relevantes':
        default:
            // Manter ordem original (relevância padrão)
            break;
    }
    
    return produtosArray;
}

// Função para aplicar filtros
function aplicarFiltros() {
    let visibleCards = obterCardsVisiveis();
    
    // Resetar para primeira página quando filtrar
    currentPage = 1;
    
    // Aplicar paginação aos cards visíveis
    aplicarPagina(visibleCards);
    
    // Atualizar contador de resultados
    atualizarContadorResultados(visibleCards.length);
    
    // Atualizar paginação
    atualizarPagina(visibleCards.length);
}

// Função para atualizar contador de resultados
function atualizarContadorResultados(visibleCount) {
    const resultsCount = document.getElementById('resultsCount');
    if (resultsCount) {
        if (visibleCount === 0) {
            resultsCount.textContent = 'Nenhum resultado encontrado';
        } else {
            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, visibleCount);
            resultsCount.textContent = `Exibindo ${startItem}-${endItem} de ${visibleCount} resultados`;
        }
    }
}

// Função para aplicar paginação aos cards
function aplicarPagina(visibleCards) {
    // Primeiro, esconder todos os cards
    const allCards = document.querySelectorAll('.service-card');
    allCards.forEach(card => {
        card.style.display = 'none';
    });
    
    // Calcular índices para a página atual
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    
    // Mostrar apenas os cards da página atual (que já estão ordenados no DOM)
    visibleCards.slice(startIndex, endIndex).forEach(card => {
        if (card && card.parentNode) {
            card.style.display = 'flex';
        }
    });
}

// Função para atualizar a interface de paginação
function atualizarPagina(totalItems) {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    const pageNumbersContainer = document.getElementById('pageNumbers');
    const prevButton = document.getElementById('prevPage');
    const nextButton = document.getElementById('nextPage');
    
    if (!pageNumbersContainer) return;
    
    // Limpar números de página existentes
    pageNumbersContainer.innerHTML = '';
    
    // Desabilitar botões se necessário
    prevButton.disabled = currentPage === 1;
    nextButton.disabled = currentPage === totalPages || totalPages === 0;
    
    if (totalPages === 0) {
        return;
    }
    
    // Calcular quais páginas mostrar
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    
    // Ajustar se estiver no início
    if (currentPage <= 3) {
        startPage = 1;
        endPage = Math.min(5, totalPages);
    }
    
    // Ajustar se estiver no final
    if (currentPage >= totalPages - 2) {
        startPage = Math.max(1, totalPages - 4);
        endPage = totalPages;
    }
    
    // Adicionar primeira página se não estiver visível
    if (startPage > 1) {
        const firstBtn = document.createElement('button');
        firstBtn.className = 'flex h-10 w-10 items-center justify-center rounded-lg bg-input-light dark:bg-input-dark text-text-light dark:text-text-dark text-sm font-bold hover:bg-border-light dark:hover:bg-border-dark transition-colors';
        firstBtn.textContent = '1';
        firstBtn.onclick = () => irParaPagina(1);
        pageNumbersContainer.appendChild(firstBtn);
        
        if (startPage > 2) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'text-subtext-light dark:text-subtext-dark';
            ellipsis.textContent = '...';
            pageNumbersContainer.appendChild(ellipsis);
        }
    }
    
    // Adicionar páginas visíveis
    for (let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        if (i === currentPage) {
            pageBtn.className = 'flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white text-sm font-bold';
        } else {
            pageBtn.className = 'flex h-10 w-10 items-center justify-center rounded-lg bg-input-light dark:bg-input-dark text-text-light dark:text-text-dark text-sm font-bold hover:bg-border-light dark:hover:bg-border-dark transition-colors';
        }
        pageBtn.textContent = i;
        pageBtn.onclick = () => irParaPagina(i);
        pageNumbersContainer.appendChild(pageBtn);
    }
    
    // Adicionar última página se não estiver visível
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'text-subtext-light dark:text-subtext-dark';
            ellipsis.textContent = '...';
            pageNumbersContainer.appendChild(ellipsis);
        }
        
        const lastBtn = document.createElement('button');
        lastBtn.className = 'flex h-10 w-10 items-center justify-center rounded-lg bg-input-light dark:bg-input-dark text-text-light dark:text-text-dark text-sm font-bold hover:bg-border-light dark:hover:bg-border-dark transition-colors';
        lastBtn.textContent = totalPages;
        lastBtn.onclick = () => irParaPagina(totalPages);
        pageNumbersContainer.appendChild(lastBtn);
    }
}

// Função para ir para uma página específica
function irParaPagina(page) {
    currentPage = page;
    
    // Obter cards visíveis após filtros (já ordenados dentro de obterCardsVisiveis)
    let visibleCards = obterCardsVisiveis();
    
    aplicarPagina(visibleCards);
    atualizarPagina(visibleCards.length);
    
    // Atualizar contador de resultados
    atualizarContadorResultados(visibleCards.length);
    
    // Scroll para o topo dos resultados
    document.getElementById('servicesGrid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Função para limpar filtros
function limparFiltros() {
    // Limpar checkboxes de categoria
    document.querySelectorAll('.filter-category').forEach(cb => {
        cb.checked = false;
    });
    
    // Marcar "Desenvolvimento Web" como padrão
    const devWebCheckbox = Array.from(document.querySelectorAll('.filter-category')).find(cb => cb.value === 'Desenvolvimento Web');
    if (devWebCheckbox) {
        devWebCheckbox.checked = true;
    }
    
    // Atualizar texto do botão
    atualizarTextoCategorias();
    
    // Limpar inputs de preço
    document.getElementById('priceMin').value = '';
    document.getElementById('priceMax').value = '';
    
    // Limpar seleção de avaliação
    selectedRating = null;
    document.querySelectorAll('.filter-rating').forEach(btn => {
        btn.classList.remove('bg-primary', 'text-white');
        btn.classList.add('text-subtext-light', 'dark:text-subtext-dark');
    });
    
    // Aplicar filtros (mostrar todos)
    aplicarFiltros();
}

// Event listeners
document.addEventListener('DOMContentLoaded', function() {
    // Redirecionar para o perfil correto baseado no tipo de conta
    const session = authService.getSession();
    if (session) {
        const profileLink = document.getElementById('profileLink');
        const routes = {
            'empresa': '../empresa/empresa-dashboard.html',
            'freelancer': '../freelancer/freelancer-dashboard.html',
            'cliente': '../cliente/cliente-produtos.html'
        };
        const profileRoute = routes[session.accountType] || '../cliente/cliente-produtos.html';
        profileLink.href = profileRoute;
    }
    
    // Botão aplicar filtros
    const applyFiltersBtn = document.getElementById('applyFilters');
    if (applyFiltersBtn) {
        applyFiltersBtn.addEventListener('click', aplicarFiltros);
    }
    
    // Botão limpar filtros
    const clearFiltersBtn = document.getElementById('clearFilters');
    if (clearFiltersBtn) {
        clearFiltersBtn.addEventListener('click', limparFiltros);
    }
    
    // Botões de avaliação
    document.querySelectorAll('.filter-rating').forEach(btn => {
        btn.addEventListener('click', function() {
            const rating = parseFloat(this.getAttribute('data-rating'));
            
            // Se clicar no mesmo botão, desmarcar
            if (selectedRating === rating) {
                selectedRating = null;
                this.classList.remove('bg-primary', 'text-white');
                this.classList.add('text-subtext-light', 'dark:text-subtext-dark');
            } else {
                // Desmarcar outros botões
                document.querySelectorAll('.filter-rating').forEach(b => {
                    b.classList.remove('bg-primary', 'text-white');
                    b.classList.add('text-subtext-light', 'dark:text-subtext-dark');
                });
                
                // Marcar este botão
                selectedRating = rating;
                this.classList.add('bg-primary', 'text-white');
                this.classList.remove('text-subtext-light', 'dark:text-subtext-dark');
            }
        });
    });
    
    // Aplicar filtros automaticamente quando categorias mudarem
    document.querySelectorAll('.filter-category').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            atualizarTextoCategorias();
            aplicarFiltros();
        });
    });
    
    // Aplicar filtros quando preços mudarem
    document.getElementById('priceMin').addEventListener('input', aplicarFiltros);
    document.getElementById('priceMax').addEventListener('input', aplicarFiltros);
    
    // Botões de navegação de página
    const prevButton = document.getElementById('prevPage');
    const nextButton = document.getElementById('nextPage');
    
    if (prevButton) {
        prevButton.addEventListener('click', () => {
            if (currentPage > 1) {
                irParaPagina(currentPage - 1);
            }
        });
    }
    
    if (nextButton) {
        nextButton.addEventListener('click', () => {
            let visibleCards = obterCardsVisiveis();
            const totalPages = Math.ceil(visibleCards.length / itemsPerPage);
            if (currentPage < totalPages) {
                irParaPagina(currentPage + 1);
            }
        });
    }
    
    // Event listener para ordenação
    const sortSelect = document.getElementById('sortSelect');
    if (sortSelect) {
        sortSelect.addEventListener('change', () => {
            aplicarFiltros();
        });
    }
    
    // Atualizar texto inicial das categorias
    atualizarTextoCategorias();
    
    // Carregar produtos do localStorage
    carregarProdutosDoStorage();
    
    // Aplicar filtros iniciais (com "Desenvolvimento Web" marcado)
    aplicarFiltros();
});
</script>
