<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Faça Login - DevHub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .hidden {
            display: none;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .success-message {
            color: #10b981;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden p-4 sm:p-6 lg:p-8">
<div class="w-full max-w-lg">
<div class="mb-8 text-center">
<a href="marketplace.html" class="flex items-center justify-center gap-2 mb-4 cursor-pointer hover:opacity-80 transition-opacity">
<img src="../Logo.png" alt="DevHub" class="w-10 h-10">
<h1 class="text-3xl font-bold text-slate-800 dark:text-white">DevHub</h1>
</a>
<h2 class="text-[#111318] dark:text-slate-200 text-4xl font-black leading-tight tracking-[-0.033em]">Bem-vindo de volta</h2>
<p class="text-[#616f89] dark:text-slate-400 text-base font-normal leading-normal mt-2">Entre na sua conta para continuar.</p>
</div>
<div class="bg-white dark:bg-slate-900/70 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div id="messageContainer" class="mb-4"></div>
<form id="loginForm" class="flex flex-col gap-5">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">E-mail</p>
<input id="email" name="email" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="seu.email@exemplo.com" type="email" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Senha</p>
<div class="relative flex w-full flex-1 items-center">
<input id="senha" name="senha" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal pr-12" placeholder="Digite sua senha" type="password" value=""/>
<button id="toggleSenha" class="absolute right-0 h-full px-3 text-[#616f89] dark:text-slate-400 hover:text-primary dark:hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<div class="flex items-center justify-between mt-2">
<div class="flex items-start gap-3">
<input class="form-checkbox h-5 w-5 shrink-0 cursor-pointer rounded border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 text-primary focus:ring-primary/50 mt-0.5" id="lembrar" type="checkbox"/>
<label class="text-sm text-[#616f89] dark:text-slate-400" for="lembrar">
                            Lembrar-me
                        </label>
</div>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Esqueceu a senha?</a>
</div>
<button id="submitBtn" class="flex h-14 w-full items-center justify-center gap-2 whitespace-nowrap rounded-lg bg-primary px-6 text-base font-semibold text-white shadow-sm transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 mt-4" type="submit">Entrar</button>
</form>
</div>
<p class="mt-8 text-center text-base text-[#616f89] dark:text-slate-400">
                Não possui uma conta? <a class="font-semibold text-primary hover:underline" href="cadastro.html">Crie uma conta</a>
</p>
</div>
</div>
<script src="../auth.js"></script>
<script>
// Função para mostrar/ocultar senha
function togglePasswordVisibility(inputId, buttonId) {
    const input = document.getElementById(inputId);
    const button = document.querySelector(`#${buttonId} span`);
    
    if (input.type === 'password') {
        input.type = 'text';
        button.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        button.textContent = 'visibility';
    }
}

// Event listener para mostrar/ocultar senha
document.getElementById('toggleSenha').addEventListener('click', () => {
    togglePasswordVisibility('senha', 'toggleSenha');
});

// Função para mostrar mensagens
function showMessage(message, type = 'error') {
    const container = document.getElementById('messageContainer');
    container.innerHTML = `<div class="p-4 rounded-lg ${type === 'error' ? 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800' : 'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800'}">
        <p class="${type === 'error' ? 'text-red-800 dark:text-red-200' : 'text-green-800 dark:text-green-200'}">${message}</p>
    </div>`;
    
    // Scroll para o topo
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    // Remover mensagem após 5 segundos
    if (type === 'success') {
        setTimeout(() => {
            container.innerHTML = '';
        }, 5000);
    }
}

// Submissão do formulário
document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';
    
    // Coletar dados do formulário
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    
    // Fazer login
    const result = authService.login(email, senha);
    
    if (result.success) {
        showMessage('Login realizado com sucesso!', 'success');
        // Redirecionar após 1 segundo
        setTimeout(() => {
            authService.redirectByAccountType(result.user.accountType);
        }, 1000);
    } else {
        showMessage(result.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
    }
});

// Verificar se já está logado
if (authService.isAuthenticated()) {
    const session = authService.getSession();
    authService.redirectByAccountType(session.accountType);
}
</script>
</body></html>
