<script>
// Carregar produtos adquiridos do localStorage
function carregarProdutosAdquiridos() {
    const compras = JSON.parse(localStorage.getItem('workspace_compras') || '[]');
    const session = authService.getSession();
    const clienteId = session?.userId;
    
    // Filtrar compras do cliente atual
    const comprasCliente = compras.filter(c => c.clienteId === clienteId);
    
    // Converter compras em formato de produtos
    const produtos = comprasCliente.map(compra => {
        const dataCompra = new Date(compra.dataCompra);
        const dataFormatada = dataCompra.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        
        // Determinar status baseado no status da compra
        let status = 'Ativo';
        let statusColor = 'green';
        
        if (compra.status === 'concluido' || compra.status === 'Concluído') {
            status = 'Concluído';
            statusColor = 'gray';
        } else if (compra.status === 'expirado' || compra.status === 'Expirado') {
            status = 'Expirado';
            statusColor = 'orange';
        } else if (compra.status === 'aguardando_pagamento' || compra.status === 'Aguardando Pagamento') {
            status = 'Aguardando Pagamento';
            statusColor = 'yellow';
        } else if (compra.status === 'processando') {
            status = 'Processando';
            statusColor = 'blue';
        }
        
        return {
            id: compra.id,
            nome: compra.produtoNome,
            descricao: compra.produtoDescricao || 'Produto adquirido através do marketplace.',
            preco: `R$ ${compra.produtoPreco.toFixed(2).replace('.', ',')}`,
            precoNumero: compra.produtoPreco,
            dataCompra: dataFormatada,
            status: status,
            statusColor: statusColor,
            codigoCompra: compra.codigoCompra,
            imagem: compra.produtoImagem || 'https://via.placeholder.com/400x300?text=Produto',
            compraOriginal: compra
        };
    });
    
    return produtos;
}

// Product Data - será carregado no DOMContentLoaded

                imagem: "https://lh3.googleusercontent.com/aida-public/AB6AXuB-XSKQhykwpKSp62LA6MoSpgKIEVY4_9YBwMdDO9uzBhzHnwpFLIdy2F1IuB0Vswbo33a0QR9PtBu7SXlJKYD4wN23ZY_6r9gb8bkhkVZCMUwzWI2BUPSB7S0ayA_BFSNbbU-6z6yxe3E0i7HTIeD3qMVej5hBf-4HvheIGURja1GxlfqusF01DQBk5DQnbd2UAK3HOKdxQEP2yUr6xlAh971339GtvIPw1UAag-jECFl4bkXkBgwltR28vGYsZjhEbTsAjorawrGY"
            }
        ];
    }
    
    produtosFiltrados = [...produtos];
    renderizarProdutos();
    atualizarPaginacao();
    
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function(e) {
            filtrarProdutos(e.target.value);
        });
    }
});

function filtrarProdutos(termo) {
    const termoLower = termo.toLowerCase().trim();
    
    if (termoLower === '') {
        produtosFiltrados = [...produtos];
    } else {
        produtosFiltrados = produtos.filter(produto => 
            produto.nome.toLowerCase().includes(termoLower)
        );
    }
    
    paginaAtual = 1;
    renderizarProdutos();
    atualizarPaginacao();
}

function renderizarProdutos() {
    const grid = document.getElementById('productsGrid');
    if (!grid) return;
    
    grid.innerHTML = '';
    
    const inicio = (paginaAtual - 1) * produtosPorPagina;
    const fim = inicio + produtosPorPagina;
    const produtosPagina = produtosFiltrados.slice(inicio, fim);
    
    produtosPagina.forEach(produto => {
        const card = criarCardProduto(produto);
        grid.appendChild(card);
    });
}

// Função helper para carregar imagem com fallback
function carregarImagemComFallback(elemento, url, fallback) {
    // Imagem padrão única para todos os produtos
    const imagemPadrao = '../Produtos.png';
    const imagemUrl = url && url.trim() !== '' ? url.trim() : null;
    const imagemParaUsar = imagemUrl || imagemPadrao;
    
    // Aplicar imagem imediatamente
    elemento.style.backgroundImage = `url('${imagemParaUsar}')`;
    elemento.style.backgroundSize = 'cover';
    elemento.style.backgroundPosition = 'center';
    elemento.style.backgroundRepeat = 'no-repeat';
    
    // Se não houver URL, já aplicamos a padrão, então retornar
    if (!imagemUrl) {
        return;
    }
    
    // Tentar carregar a imagem real em segundo plano
    const img = new Image();
    img.crossOrigin = 'anonymous';
    
    img.onload = function() {
        // Se carregar com sucesso, aplicar a imagem real
        elemento.style.backgroundImage = `url('${imagemUrl}')`;
    };
    
    img.onerror = function() {
        // Se falhar, manter a imagem padrão (já está aplicada)
        console.log('Erro ao carregar imagem:', imagemUrl);
        elemento.style.backgroundImage = `url('${imagemPadrao}')`;
    };
    
    // Tentar carregar a imagem
    try {
        img.src = imagemUrl;
    } catch (e) {
        console.log('Erro ao definir src da imagem:', e);
        elemento.style.backgroundImage = `url('${imagemPadrao}')`;
    }
}

function criarCardProduto(produto) {
    const card = document.createElement('div');
    card.className = 'flex flex-col gap-3 pb-3 bg-white dark:bg-[#111722] p-4 rounded-xl border border-gray-200 dark:border-gray-800 hover:shadow-lg transition-shadow product-card fade-in';
    
    const statusColors = {
        'Ativo': 'text-green-500 bg-green-500/10',
        'Concluído': 'text-gray-500 bg-gray-500/10',
        'Expirado': 'text-orange-500 bg-orange-500/10'
    };
    
    const statusClass = statusColors[produto.status] || 'text-gray-500 bg-gray-500/10';
    
    // Criar elemento de imagem com tratamento de erro
    const imagemDiv = document.createElement('div');
    imagemDiv.className = 'w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg cursor-pointer bg-gray-200 dark:bg-gray-700';
    imagemDiv.onclick = () => verDetalhes(produto.id);
    // Garantir que o elemento tenha dimensões mínimas
    imagemDiv.style.minHeight = '200px';
    // Garantir que o produto tenha imagem (usar a do produto ou padrão)
    const imagemProduto = produto.imagem && produto.imagem.trim() !== '' 
        ? produto.imagem 
        : '../Produtos.png';
    carregarImagemComFallback(imagemDiv, imagemProduto);
    
    card.innerHTML = `
        <div>
            <p class="text-gray-900 dark:text-white text-base font-medium leading-normal">${produto.nome}</p>
            <p class="text-gray-500 dark:text-[#92a4c9] text-sm font-normal leading-normal mt-1">Adquirido em: ${produto.dataCompra}</p>
            <p class="text-gray-500 dark:text-[#92a4c9] text-sm font-normal leading-normal flex items-center gap-2 mb-2">
                Status: <span class="${statusClass} px-2 py-0.5 rounded-full text-xs font-medium">${produto.status}</span>
            </p>
            <div class="flex gap-2 mt-2">
                <button onclick="verDetalhes(${produto.id})" 
                        class="flex-1 px-3 py-1.5 text-xs font-medium rounded-lg bg-primary/10 dark:bg-primary/20 text-primary dark:text-white hover:bg-primary/20 dark:hover:bg-primary/30 transition-colors">
                    Ver Detalhes
                </button>
                ${produto.status === 'Expirado' 
                    ? `<button onclick="renovarProduto(${produto.id})" class="flex-1 px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Renovar</button>`
                    : produto.status === 'Concluído'
                    ? `<button onclick="avaliarProduto(${produto.id})" class="flex-1 px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Avaliar</button>`
                    : `<button onclick="solicitarSuporte(${produto.id})" class="flex-1 px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Suporte</button>`
                }
            </div>
        </div>
    `;
    
    // Inserir a imagem no início do card
    card.insertBefore(imagemDiv, card.firstChild);
    
    return card;
}

function verDetalhes(id) {
    produtoSelecionado = produtos.find(p => p.id === id);
    if (!produtoSelecionado) return;
    
    // Hide list view
    const listView = document.getElementById('productListView');
    const detailsView = document.getElementById('productDetailsView');
    
    if (listView && detailsView) {
        listView.classList.add('hidden');
        detailsView.classList.remove('hidden');
        
        // Populate details
        const imagemEl = document.getElementById('productDetailImage');
        // Garantir que o produto tenha imagem (usar a do produto ou padrão)
        const imagemProduto = produtoSelecionado.imagem && produtoSelecionado.imagem.trim() !== '' 
            ? produtoSelecionado.imagem 
            : '../Produtos.png';
        carregarImagemComFallback(imagemEl, imagemProduto);
        document.getElementById('productDetailName').textContent = produtoSelecionado.nome;
        document.getElementById('productDetailDescription').textContent = produtoSelecionado.descricao;
        document.getElementById('productDetailPrice').textContent = produtoSelecionado.preco;
        document.getElementById('productDetailDate').textContent = produtoSelecionado.dataCompra;
        document.getElementById('productDetailCode').textContent = produtoSelecionado.codigoCompra;
        
        // Status
        const statusElement = document.getElementById('productDetailStatus');
        const statusColors = {
            'Ativo': 'text-green-500 bg-green-500/10',
            'Concluído': 'text-gray-500 bg-gray-500/10',
            'Expirado': 'text-orange-500 bg-orange-500/10'
        };
        const statusClass = statusColors[produtoSelecionado.status] || 'text-gray-500 bg-gray-500/10';
        statusElement.className = `inline-block ${statusClass} px-3 py-1 rounded-full text-sm font-medium`;
        statusElement.textContent = produtoSelecionado.status;
        
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function voltarParaLista() {
    const listView = document.getElementById('productListView');
    const detailsView = document.getElementById('productDetailsView');
    
    if (listView && detailsView) {
        detailsView.classList.add('hidden');
        listView.classList.remove('hidden');
        produtoSelecionado = null;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function avaliarProduto(id) {
    const produto = id ? produtos.find(p => p.id === id) : produtoSelecionado;
    if (!produto) return;
    
    const avaliacao = prompt(`Avaliar produto: ${produto.nome}\n\nDigite sua avaliação (1-5 estrelas):`);
    if (avaliacao) {
        alert(`Obrigado pela sua avaliação! Você avaliou "${produto.nome}" com ${avaliacao} estrelas.`);
    }
}

function verGarantia() {
    if (!produtoSelecionado) return;
    
    alert(`Garantia do produto: ${produtoSelecionado.nome}\n\n` +
          `Código da Compra: ${produtoSelecionado.codigoCompra}\n` +
          `Data da Compra: ${produtoSelecionado.dataCompra}\n` +
          `Status: ${produtoSelecionado.status}\n\n` +
          `Este produto possui garantia de 12 meses a partir da data de compra.`);
}

function renovarProduto(id) {
    const produto = produtos.find(p => p.id === id);
    if (!produto) return;
    
    if (confirm(`Deseja renovar o produto "${produto.nome}"?`)) {
        alert(`Renovação solicitada para "${produto.nome}". Você será redirecionado para a página de pagamento.`);
    }
}

function solicitarSuporte(id) {
    const produto = produtos.find(p => p.id === id);
    if (!produto) return;
    
    alert(`Solicitação de suporte para: ${produto.nome}\n\nNossa equipe entrará em contato em breve.`);
}

function atualizarPaginacao() {
    const container = document.getElementById('paginationContainer');
    if (!container) return;
    
    const totalPaginas = Math.ceil(produtosFiltrados.length / produtosPorPagina);
    
    if (totalPaginas <= 1) {
        container.innerHTML = '';
        return;
    }
    
    let html = '';
    
    // Previous button
    html += `<button onclick="paginarProdutos(-1)" ${paginaAtual === 1 ? 'disabled class="flex size-10 items-center justify-center text-gray-300 dark:text-gray-600 rounded-full cursor-not-allowed"' : 'class="flex size-10 items-center justify-center text-gray-500 dark:text-white hover:bg-gray-100 dark:hover:bg-white/5 rounded-full cursor-pointer"'}><span class="material-symbols-outlined text-lg">chevron_left</span></button>`;
    
    // Page numbers
    const maxButtons = 5;
    let startPage = Math.max(1, paginaAtual - Math.floor(maxButtons / 2));
    let endPage = Math.min(totalPaginas, startPage + maxButtons - 1);
    
    if (endPage - startPage < maxButtons - 1) {
        startPage = Math.max(1, endPage - maxButtons + 1);
    }
    
    if (startPage > 1) {
        html += `<button onclick="paginarProdutos(1)" class="text-sm font-normal leading-normal flex size-10 items-center justify-center text-gray-700 dark:text-white rounded-full hover:bg-gray-100 dark:hover:bg-white/5 cursor-pointer">1</button>`;
        if (startPage > 2) {
            html += `<span class="px-2 text-gray-500">...</span>`;
        }
    }
    
    for (let i = startPage; i <= endPage; i++) {
        const isActive = i === paginaAtual;
        html += `<button onclick="paginarProdutos(${i})" id="pagina-${i}" class="text-sm ${isActive ? 'font-bold text-white bg-primary' : 'font-normal text-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-white/5'} leading-normal flex size-10 items-center justify-center rounded-full cursor-pointer">${i}</button>`;
    }
    
    if (endPage < totalPaginas) {
        if (endPage < totalPaginas - 1) {
            html += `<span class="px-2 text-gray-500">...</span>`;
        }
        html += `<button onclick="paginarProdutos(${totalPaginas})" class="text-sm font-normal leading-normal flex size-10 items-center justify-center text-gray-700 dark:text-white rounded-full hover:bg-gray-100 dark:hover:bg-white/5 cursor-pointer">${totalPaginas}</button>`;
    }
    
    // Next button
    html += `<button onclick="paginarProdutos('proximo')" ${paginaAtual === totalPaginas ? 'disabled class="flex size-10 items-center justify-center text-gray-300 dark:text-gray-600 rounded-full cursor-not-allowed"' : 'class="flex size-10 items-center justify-center text-gray-500 dark:text-white hover:bg-gray-100 dark:hover:bg-white/5 rounded-full cursor-pointer"'}><span class="material-symbols-outlined text-lg">chevron_right</span></button>`;
    
    container.innerHTML = html;
}

function paginarProdutos(pagina) {
    const totalPaginas = Math.ceil(produtosFiltrados.length / produtosPorPagina);
    
    if (pagina === 'proximo') {
        if (paginaAtual < totalPaginas) {
            paginaAtual++;
        } else {
            return;
        }
    } else if (pagina === -1 || pagina < 0) {
        if (paginaAtual > 1) {
            paginaAtual--;
        } else {
            return;
        }
    } else if (typeof pagina === 'number' && pagina > 0 && pagina <= totalPaginas) {
        paginaAtual = pagina;
    }
    
    renderizarProdutos();
    atualizarPaginacao();
    
    // Scroll to top of products
    const grid = document.getElementById('productsGrid');
    if (grid) {
        grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}
</script>
<script src="../auth.js"></script>
<script>
function sair() {
    if (confirm('Tem certeza que deseja sair?')) {
        authService.logout();
        window.location.href = '../shared/cadastro.html';
    }
}

if (!authService.protectRoute('cliente')) {
}

// Carregar dados do usuário
function carregarDadosUsuario() {
    const user = authService.getCurrentUser();
    if (!user) return;

    // Preencher informações no sidebar
    const nomeElement = document.querySelector('aside h1');
    const empresaElement = document.querySelector('aside p');
    
    if (nomeElement) {
        nomeElement.textContent = user.nome || 'Usuário';
    }
    if (empresaElement && user.nomeEmpresa) {
        empresaElement.textContent = user.nomeEmpresa;
    } else if (empresaElement) {
        empresaElement.textContent = 'Cliente';
    }
}

// Executar quando a página carregar
document.addEventListener('DOMContentLoaded', carregarDadosUsuario);
</script>
