<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crie sua Conta</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        .hidden {
            display: none;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .success-message {
            color: #10b981;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden p-4 sm:p-6 lg:p-8">
<div class="w-full max-w-lg">
<div class="mb-8 text-center">
<div class="flex items-center justify-center gap-2 mb-4">
<img src="../assets/img/Logo.png" alt="DevHub" class="w-10 h-10">
<h1 class="text-3xl font-bold text-slate-800 dark:text-white">DevHub</h1>
</div>
<h2 class="text-[#111318] dark:text-slate-200 text-4xl font-black leading-tight tracking-[-0.033em]">Crie sua conta</h2>
<p class="text-[#616f89] dark:text-slate-400 text-base font-normal leading-normal mt-2">Gerencie seus projetos e equipes em um só lugar.</p>
</div>
<div class="bg-white dark:bg-slate-900/70 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div id="messageContainer" class="mb-4"></div>
<form id="cadastroForm" class="flex flex-col gap-5">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Nome Completo</p>
<input id="nome" name="nome" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Insira seu nome completo" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">E-mail</p>
<input id="email" name="email" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="seu.email@exemplo.com" type="email" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Senha</p>
<div class="relative flex w-full flex-1 items-center">
<input id="senha" name="senha" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal pr-12" placeholder="Crie uma senha forte" type="password" value=""/>
<button id="toggleSenha1" class="absolute right-0 h-full px-3 text-[#616f89] dark:text-slate-400 hover:text-primary dark:hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Confirmar Senha</p>
<div class="relative flex w-full flex-1 items-center">
<input id="confirmarSenha" name="confirmarSenha" required class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal pr-12" placeholder="Repita a senha" type="password" value=""/>
<button id="toggleSenha2" class="absolute right-0 h-full px-3 text-[#616f89] dark:text-slate-400 hover:text-primary dark:hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<fieldset>
<legend class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-3">Eu sou um(a):</legend>
<div class="grid grid-cols-3 gap-3">
<div>
<input checked="" class="sr-only peer" id="cliente" name="account_type" type="radio" value="cliente"/>
<label class="flex w-full cursor-pointer items-center justify-center rounded-lg border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 p-3 text-sm font-medium text-[#111318] dark:text-slate-300 ring-2 ring-transparent transition-all hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:text-primary peer-checked:ring-primary" for="cliente">Cliente</label>
</div>
<div>
<input class="sr-only peer" id="empresa" name="account_type" type="radio" value="empresa"/>
<label class="flex w-full cursor-pointer items-center justify-center rounded-lg border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 p-3 text-sm font-medium text-[#111318] dark:text-slate-300 ring-2 ring-transparent transition-all hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:text-primary peer-checked:ring-primary" for="empresa">Empresa</label>
</div>
<div>
<input class="sr-only peer" id="freelancer" name="account_type" type="radio" value="freelancer"/>
<label class="flex w-full cursor-pointer items-center justify-center rounded-lg border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 p-3 text-sm font-medium text-[#111318] dark:text-slate-300 ring-2 ring-transparent transition-all hover:bg-slate-50 dark:hover:bg-slate-700 peer-checked:text-primary peer-checked:ring-primary" for="freelancer">Freelancer</label>
</div>
</div>
</fieldset>
<!-- Campos condicionais para Empresa -->
<div id="empresaFields" class="hidden flex flex-col gap-5 mt-2">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Nome da Empresa</p>
<input id="nomeEmpresa" name="nomeEmpresa" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Nome da sua empresa" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">CNPJ</p>
<input id="cnpj" name="cnpj" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="XX.XXX.XXX/XXXX-XX" maxlength="18" value=""/>
<small class="text-[#616f89] dark:text-slate-400 text-sm mt-1">Formato: XX.XXX.XXX/XXXX-XX</small>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Telefone</p>
<input id="telefone" name="telefone" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="(XX) XXXXX-XXXX" value=""/>
</label>
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-slate-300 text-base font-medium leading-normal pb-2">Endereço</p>
<input id="endereco" name="endereco" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary dark:focus:border-primary h-14 placeholder:text-[#616f89] dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Endereço completo" value=""/>
</label>
</div>
<div class="flex items-start gap-3 mt-2">
<input class="form-checkbox h-5 w-5 shrink-0 cursor-pointer rounded border-[#dbdfe6] dark:border-slate-700 bg-white dark:bg-slate-800 text-primary focus:ring-primary/50 mt-0.5" id="terms" type="checkbox" required/>
<label class="text-sm text-[#616f89] dark:text-slate-400" for="terms">
                            Ao se registrar, você concorda com nossos <a class="font-semibold text-primary hover:underline" href="#">Termos de Serviço</a> e <a class="font-semibold text-primary hover:underline" href="#">Política de Privacidade</a>.
                        </label>
</div>
<button id="submitBtn" class="flex h-14 w-full items-center justify-center gap-2 whitespace-nowrap rounded-lg bg-primary px-6 text-base font-semibold text-white shadow-sm transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 mt-4" type="submit">Registrar</button>
</form>
</div>
<p class="mt-8 text-center text-base text-[#616f89] dark:text-slate-400">
                Já possui uma conta? <a class="font-semibold text-primary hover:underline" href="Login.html" id="loginLink">Faça login</a>
</p>
</div>
</div>
<script src="../assets/js/auth.js"></script>
<script>
// Função para mostrar/ocultar senha
function togglePasswordVisibility(inputId, buttonId) {
    const input = document.getElementById(inputId);
    const button = document.querySelector(`#${buttonId} span`);
    
    if (input.type === 'password') {
        input.type = 'text';
        button.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        button.textContent = 'visibility';
    }
}

// Event listeners para mostrar/ocultar senha
document.getElementById('toggleSenha1').addEventListener('click', () => {
    togglePasswordVisibility('senha', 'toggleSenha1');
});

document.getElementById('toggleSenha2').addEventListener('click', () => {
    togglePasswordVisibility('confirmarSenha', 'toggleSenha2');
});

// Mostrar/ocultar campos da empresa
const accountTypeRadios = document.querySelectorAll('input[name="account_type"]');
const empresaFields = document.getElementById('empresaFields');

accountTypeRadios.forEach(radio => {
    radio.addEventListener('change', () => {
        if (radio.value === 'empresa') {
            empresaFields.classList.remove('hidden');
            // Tornar campos obrigatórios
            document.getElementById('nomeEmpresa').required = true;
            document.getElementById('cnpj').required = true;
        } else {
            empresaFields.classList.add('hidden');
            // Remover obrigatoriedade
            document.getElementById('nomeEmpresa').required = false;
            document.getElementById('cnpj').required = false;
        }
    });
});

// Formatação do CNPJ
document.getElementById('cnpj').addEventListener('input', (e) => {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length <= 14) {
        value = value.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
        e.target.value = value;
    }
});

// Formatação do Telefone
document.getElementById('telefone').addEventListener('input', (e) => {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length <= 11) {
        if (value.length <= 10) {
            value = value.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
        } else {
            value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
        }
        e.target.value = value;
    }
});

// Função para mostrar mensagens
function showMessage(message, type = 'error') {
    const container = document.getElementById('messageContainer');
    container.innerHTML = `<div class="p-4 rounded-lg ${type === 'error' ? 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800' : 'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800'}">
        <p class="${type === 'error' ? 'text-red-800 dark:text-red-200' : 'text-green-800 dark:text-green-200'}">${message}</p>
    </div>`;
    
    // Scroll para o topo
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    // Remover mensagem após 5 segundos
    if (type === 'success') {
        setTimeout(() => {
            container.innerHTML = '';
        }, 5000);
    }
}

// Submissão do formulário
document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Registrando...';
    
    // Coletar dados do formulário
    const formData = {
        nome: document.getElementById('nome').value.trim(),
        email: document.getElementById('email').value.trim(),
        senha: document.getElementById('senha').value,
        confirmarSenha: document.getElementById('confirmarSenha').value,
        accountType: document.querySelector('input[name="account_type"]:checked').value,
        telefone: document.getElementById('telefone').value.trim()
    };
    
    // Adicionar campos específicos da empresa
    if (formData.accountType === 'empresa') {
        formData.nomeEmpresa = document.getElementById('nomeEmpresa').value.trim();
        formData.cnpj = document.getElementById('cnpj').value.trim();
        formData.endereco = document.getElementById('endereco').value.trim();
    }
    
    // Registrar usuário (agora com await)
    const result = await authService.register(formData);
    
    if (result.success) {
        showMessage(result.message, 'success');
        // Redirecionar após 1 segundo
        setTimeout(() => {
            // Usar o tipo do usuário retornado
            const accountType = result.user.tipo || result.user.accountType || formData.accountType;
            console.log('Redirecionando após cadastro para tipo:', accountType);
            console.log('Dados do usuário:', result.user);
            if (accountType) {
                authService.redirectByAccountType(accountType);
            } else {
                console.error('Tipo de conta não encontrado:', result.user);
                showMessage('Erro ao identificar tipo de conta', 'error');
            }
        }, 1000);
    } else {
        showMessage(result.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Registrar';
    }
});

// Verificar se já está logado (evitar loop)
(async () => {
    const session = authService.getSession();
    if (session && session.accountType) {
        // Verificar com servidor se a sessão ainda é válida
        const isValid = await authService.checkAuthentication();
        if (isValid) {
            // Redirecionar apenas se não estiver na página correta
            const currentPage = window.location.pathname;
            const accountType = session.accountType.toLowerCase();
            // Só redirecionar se não estiver na página correta
            if (!currentPage.includes(accountType === 'empresa' ? 'Perfil-Empresa' : 
                                     accountType === 'freelancer' ? 'freelancer' : 
                                     'Marketplace')) {
                authService.redirectByAccountType(session.accountType);
            }
        } else {
            // Sessão inválida, limpar
            localStorage.removeItem('workspace_session');
        }
    }
})();
</script>
</body></html>
